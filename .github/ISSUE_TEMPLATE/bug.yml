name: Bug report
description: Report a defect in openzigs-social
title: "[BUG] "
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One-paragraph description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: openzigs-social version / commit SHA
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Windows
        - Linux
        - Docker
    validations:
      required: true
  - type: dropdown
    id: provider
    attributes:
      label: LLM provider in use
      options:
        - Local Ollama (Gemma 4)
        - OpenAI (BYOK)
        - Anthropic (BYOK)
        - GitHub Copilot
        - OpenAI-compatible (other)
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Redact tokens and personal data.
      render: shell
