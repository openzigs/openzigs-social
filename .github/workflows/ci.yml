name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: API (lint + typecheck + test)
    runs-on: ubuntu-latest
    env:
      NPM_CONFIG_PRODUCTION: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Enable Corepack
        run: corepack enable
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      - name: Lint
        run: pnpm lint
      - name: Typecheck
        run: pnpm typecheck
      - name: Test
        run: pnpm test

  ui:
    name: UI (lint + build)
    runs-on: ubuntu-latest
    env:
      NPM_CONFIG_PRODUCTION: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Enable Corepack
        run: corepack enable
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      - name: Lint UI
        working-directory: ui
        run: pnpm lint
      - name: Build UI
        working-directory: ui
        run: pnpm build
