name: Graphify refresh

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "ui/**"
      - "config/**"
      - "package.json"
      - "pnpm-workspace.yaml"
  pull_request:
    paths:
      - "src/**"
      - "ui/**"
      - "config/**"
      - "package.json"
      - "pnpm-workspace.yaml"

concurrency:
  group: graphify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  refresh:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository || github.event_name == 'push' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref }}
          fetch-depth: 0
      - name: Skip on opt-out
        if: ${{ contains(github.event.head_commit.message, '[skip graphify]') }}
        run: |
          echo "Skip graphify requested"
          exit 0
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Install graphify
        run: uv tool install graphifyy==0.5.6
      - name: Build graph
        run: graphify build .
      - name: Show report
        if: always()
        run: |
          if [ -f graphify-out/GRAPH_REPORT.md ]; then
            head -200 graphify-out/GRAPH_REPORT.md
          fi
      - name: Commit graph changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(graphify): refresh graph [skip ci]"
          file_pattern: "graphify-out/graph.json graphify-out/GRAPH_REPORT.md"
          commit_user_name: graphify-bot
          commit_user_email: graphify-bot@users.noreply.github.com
